name: Generate Changelog (PR test)

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  changelog:
    runs-on: ubuntu-latest

    env:
      FROM_TAG: v1.2.0
      TO_TAG: v1.3.0

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate commit list
        id: diff
        run: |
          git log $FROM_TAG..$TO_TAG --pretty=format:"%s" > commits.txt

          echo "commits<<EOF" >> $GITHUB_OUTPUT
          cat commits.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate changelog with AI
        id: ai
        uses: github/ai-inference@v1
        with:
          model: gpt-4o
          prompt: |
            You are a release manager.

            Create a structured changelog with sections:
            - Features
            - Bug Fixes
            - Improvements
            - Breaking Changes

            Ignore trivial commits (CI, formatting, typos).

            Commits:
            ${{ steps.diff.outputs.commits }}

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## 🤖 Generated Changelog\n\n${{ steps.ai.outputs.response }}`;

            github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body
            });
