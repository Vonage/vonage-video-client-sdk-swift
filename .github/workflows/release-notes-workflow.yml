name: Generate Changelog (PR test)

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  changelog:
    runs-on: ubuntu-latest

    env:
      FROM_TAG: 2.32.0
      TO_TAG: 2.32.1

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate commit list
        run: |
          git log $FROM_TAG..$TO_TAG --pretty=format:"%s" > commits.txt

          # avoid empty input edge case
          if [ ! -s commits.txt ]; then
            echo "No commits found" > commits.txt
          fi
          
      - name: Generate changelog with AI
        id: ai
        uses: actions/ai-inference@v1
        with:
          model: gpt-4o
          prompt: |
            You are a release manager.

            Create a structured changelog with sections:
            - Features
            - Bug Fixes
            - Improvements
            - Breaking Changes

            Ignore trivial commits (CI, formatting, typos).

            Commits:
            ${{ steps.diff.outputs.commits }}

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## 🤖 Generated Changelog\n\n${{ steps.ai.outputs.response }}`;

            github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body
            });
